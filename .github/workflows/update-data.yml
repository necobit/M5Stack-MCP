name: Update product data

on:
  schedule:
    # 毎週月曜 03:00 UTC（12:00 JST）
    - cron: "0 3 * * 1"
  workflow_dispatch:

permissions:
  contents: write

jobs:
  update:
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4

      - uses: actions/setup-node@v4
        with:
          node-version: 22
          cache: npm

      - run: npm ci

      - name: Fetch latest product data
        run: npm run update-data

      - name: Verify snapshot still passes tests
        run: npm test

      - name: Commit and push if changed
        run: |
          # meta.json は取得日時だけで毎回変わるので、実データの差分のみ見る
          if git diff --quiet -- data/products.json data/categories.json; then
            echo "No product data changes"
            exit 0
          fi
          git config user.name "github-actions[bot]"
          git config user.email "github-actions[bot]@users.noreply.github.com"
          git add data/
          git commit -m "chore: 製品データ自動更新 ($(date -u +%Y-%m-%d))"
          git push
